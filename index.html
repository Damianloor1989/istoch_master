<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Stock Master Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1d63ff">
    <link rel="apple-touch-icon" href="icono.png">
    <link rel="icon" href="icono.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SweetAlert2 para mensajes elegantes -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #1d63ff; --bg: #f4f7fe; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding-bottom: 90px; }
        .app-header { background: white; padding: 20px 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .product-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.04); cursor: pointer; }
        .stock-badge { font-weight: 800; border-radius: 8px; padding: 4px 10px; min-width: 45px; text-align: center; }
        .st-ok { background: #e3faf3; color: #12b886; }
        .st-low { background: #fff4e6; color: #fd7e14; }
        .st-out { background: #fff5f5; color: #fa5252; }
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; border: none; font-size: 28px; box-shadow: 0 4px 12px rgba(29,99,255,0.3); z-index: 1001; display: flex; align-items: center; justify-content: center; }
        .btn-cart { border: none; background: #f0f4ff; color: #1d63ff; border-radius: 10px; padding: 8px; font-size: 1.2rem; }
        #pantalla-login { max-width: 400px; margin: 80px auto; padding: 20px; }
        #nombre-tienda-display { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
        .cat-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .cat-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

    <div id="pantalla-login" style="display:block;">
        <div class="card border-0 shadow-sm p-4" style="border-radius: 20px;">
            <div class="text-center mb-4">
                <img src="icono.png" alt="Logo" style="width: 80px; border-radius: 15px;" class="mb-3">
                <h3 class="fw-bold text-primary">Stock Master Pro</h3>
            </div>
            <input type="email" id="login-email" class="form-control mb-3" placeholder="Correo electrónico">
            <input type="password" id="login-pass" class="form-control mb-3" placeholder="Contraseña">
            <button class="btn btn-primary w-100 py-3 fw-bold" onclick="login()">Entrar</button>
        </div>
    </div>

    <div id="app-principal" style="display:none;">
        <div class="app-header">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h3 class="fw-bold m-0 text-primary" id="nombre-tienda-display">Cargando...</h3>
                    <button class="btn btn-sm btn-outline-danger px-3 rounded-pill" onclick="logout()">Salir</button>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <button class="btn btn-link btn-sm p-0 text-decoration-none fw-bold text-secondary" onclick="abrirModalCategorias()">⚙️ Categorías</button>
                    <div>
                        <button class="btn btn-success btn-sm rounded-pill px-3 me-1" onclick="exportarExcel()">📊 Excel</button>
                        <button class="btn btn-light btn-sm rounded-pill px-3" onclick="init()">🔄</button>
                    </div>
                </div>
                <input type="text" id="buscador" class="form-control shadow-sm" placeholder="Buscar producto o SKU..." oninput="filtrar(this.value)">
            </div>
        </div>
        <div class="container mt-3" id="contenedor-productos"></div>
        <button class="fab" onclick="abrirModal()">+</button>
    </div>

    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered p-3">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-body p-4">
                    <h5 class="fw-bold mb-4">Gestión de Producto</h5>
                    <input type="hidden" id="edit-id">
                    <div class="row g-3">
                        <div class="col-6"><label class="small fw-bold">SKU</label><input type="text" id="p-sku" class="form-control"></div>
                        <div class="col-6"><label class="small fw-bold">NOMBRE</label><input type="text" id="p-nombre" class="form-control"></div>
                        <div class="col-12"><label class="small fw-bold">CATEGORÍA</label><select id="p-categoria" class="form-select"></select></div>
                        <div class="col-6"><label class="small fw-bold">COSTO $</label><input type="number" id="p-costo" class="form-control" step="0.01"></div>
                        <div class="col-6"><label class="small fw-bold">VENTA $</label><input type="number" id="p-precio" class="form-control" step="0.01"></div>
                        <div class="col-12" id="box-stock"><label class="small fw-bold">STOCK INICIAL</label><input type="number" id="p-stock" class="form-control" value="0"></div>
                    </div>
                    <button class="btn btn-primary w-100 py-3 fw-bold mt-4" onclick="guardar()">Guardar Producto</button>
                    <button class="btn btn-link btn-sm w-100 text-danger mt-2" id="btn-eliminar" style="display:none;" onclick="eliminarProducto()">Eliminar Producto</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCategorias" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered p-3">
            <div class="modal-content border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold text-primary m-0">Mis Categorías</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="input-group mb-4">
                        <input type="text" id="nueva-cat-nombre" class="form-control shadow-none" placeholder="Nueva categoría...">
                        <button class="btn btn-primary" onclick="crearCategoria()">Añadir</button>
                    </div>
                    <div id="lista-categorias-container" style="max-height: 300px; overflow-y: auto;">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const _supa = supabase.createClient('https://ezkjcnktgibhbkoftcvg.supabase.co', 'sb_publishable_pTUxOpSUoat4-5Tw--kxyQ_HuZldNs4');
        let dbLocal = []; 
        let MI_TIENDA_ID = null;
        let TIENDA_NOMBRE = "Mi Negocio";
               // Función para mostrar notificaciones rápidas (Toasts)
const notify = (titulo, texto, icono) => {
    Swal.fire({
        title: titulo,
        text: texto,
        icon: icono, // 'success', 'error', 'warning', 'info'
        confirmButtonColor: '#1d63ff',
        timer: 3000
    });
};
        
        // Inicializar Modales
        const modalProd = new bootstrap.Modal(document.getElementById('modalProducto'));
        const modalCat = new bootstrap.Modal(document.getElementById('modalCategorias'));

        async function verificarSesion() {
            const { data: { session } } = await _supa.auth.getSession();
            if (session) {
                const { data: tienda } = await _supa.from('tiendas').select('*').eq('owner_id', session.user.id).single();
                if (tienda) {
                    MI_TIENDA_ID = tienda.id;
                    TIENDA_NOMBRE = tienda.nombre_comercial || "Mi Tienda";
                    document.getElementById('nombre-tienda-display').innerText = "📦 " + TIENDA_NOMBRE;
                    document.getElementById('pantalla-login').style.display = 'none';
                    document.getElementById('app-principal').style.display = 'block';
                    init();
                } else { logout(); }
            } else {
                document.getElementById('pantalla-login').style.display = 'block';
                document.getElementById('app-principal').style.display = 'none';
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const { error } = await _supa.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Credenciales incorrectas");
            else verificarSesion();
        }

        async function logout() {
            await _supa.auth.signOut();
            window.location.reload();
        }

        async function init() { 
            await cargarCategorias(); 
            await cargarDatos(); 
        }

        // LÓGICA DE CATEGORÍAS
        function abrirModalCategorias() {
            modalCat.show();
            cargarCategorias();
        }

        async function cargarCategorias() {
            const { data, error } = await _supa.from('categorias')
                .select('*')
                .eq('tienda_id', MI_TIENDA_ID)
                .order('nombre');

            if (error) return;

            // Rellenar el Select del producto
            const select = document.getElementById('p-categoria');
            select.innerHTML = '<option value="">Sin categoría</option>';
            
            // Rellenar la lista del modal de gestión
            const listaContainer = document.getElementById('lista-categorias-container');
            listaContainer.innerHTML = '';

            data?.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
                listaContainer.innerHTML += `
                    <div class="d-flex justify-content-between align-items-center cat-item">
                        <span>${c.nombre}</span>
                        <button class="btn btn-sm btn-light text-danger" onclick="eliminarCat('${c.id}')">🗑️</button>
                    </div>`;
            });
        }

        async function crearCategoria() {
            const nom = document.getElementById('nueva-cat-nombre').value;
            if (!nom) return;
            
            await _supa.from('categorias').insert([{ nombre: nom, tienda_id: MI_TIENDA_ID }]);
            document.getElementById('nueva-cat-nombre').value = '';
            await cargarCategorias();
        }

        async function eliminarCat(id) {
            if(confirm("¿Eliminar categoría? Esto no borrará los productos, pero quedarán sin categoría.")) {
                await _supa.from('categorias').delete().eq('id', id);
                await cargarCategorias();
            }
        }

        // LÓGICA DE PRODUCTOS
        async function cargarDatos() {
            const { data } = await _supa.from('productos')
                .select('*, categorias(nombre)')
                .eq('tienda_id', MI_TIENDA_ID)
                .order('nombre');
            dbLocal = data || [];
            renderizar(dbLocal);
        }

        function renderizar(items) {
    const container = document.getElementById('contenedor-productos');
    container.innerHTML = items.map(p => {
        // Lógica de colores para el stock actual
        const bCls = p.stock_actual <= 0 ? 'st-out' : (p.stock_actual < 5 ? 'st-low' : 'st-ok');
        
        return `
        <div class="product-card d-flex justify-content-between align-items-center">
            <!-- Sección de información del producto -->
            <div onclick="abrirModal('${p.id}')" style="flex:1; cursor:pointer;">
                <small class="text-muted">${p.categorias?.nombre || 'General'} | SKU: ${p.sku || '-'}</small>
                <h6 class="fw-bold m-0">${p.nombre}</h6>
                <span class="text-primary fw-bold">$${p.precio_venta}</span>
            </div>
            
            <!-- Sección de acciones y stock -->
            <div class="text-end">
                <div class="stock-badge ${bCls}">${p.stock_actual || 0}</div>
                <div class="btn-group mt-2">
                    
                    <!-- BOTÓN AÑADIR (Color Verde con +) -->
                    <button class="btn-cart me-1" 
                            style="background-color: #28a745; color: white; font-weight: bold; font-size: 1.2rem; line-height: 1;" 
                            onclick="event.stopPropagation(); añadirStock('${p.id}', '${p.nombre}')" 
                            title="Añadir existencias">
                        +
                    </button>

                    <!-- BOTÓN VENTA (Carrito) -->
                    <button class="btn-cart" 
                            onclick="event.stopPropagation(); registrarVenta('${p.id}')" 
                            title="Registrar venta">
                        🛒
                    </button>
                    
                </div>
            </div>
        </div>`;
    }).join('');
}

        function abrirModal(id = null) {
            document.getElementById('edit-id').value = id || '';
            document.getElementById('box-stock').style.display = id ? 'none' : 'block';
            document.getElementById('btn-eliminar').style.display = id ? 'block' : 'none';
            
            if(id) {
                const p = dbLocal.find(x => x.id === id);
                document.getElementById('p-sku').value = p.sku;
                document.getElementById('p-nombre').value = p.nombre;
                document.getElementById('p-categoria').value = p.categoria_id || '';
                document.getElementById('p-costo').value = p.precio_costo;
                document.getElementById('p-precio').value = p.precio_venta;
            } else { 
                document.querySelectorAll('#modalProducto .form-control, #modalProducto .form-select').forEach(i => i.value = ''); 
            }
            modalProd.show();
        }

        async function guardar() {
            const id = document.getElementById('edit-id').value;
            const obj = {
                sku: document.getElementById('p-sku').value,
                nombre: document.getElementById('p-nombre').value,
                categoria_id: document.getElementById('p-categoria').value || null,
                precio_costo: parseFloat(document.getElementById('p-costo').value) || 0,
                precio_venta: parseFloat(document.getElementById('p-precio').value) || 0,
                tienda_id: MI_TIENDA_ID
            };
            if (id) { await _supa.from('productos').update(obj).eq('id', id); }
            else { 
                obj.stock_actual = parseInt(document.getElementById('p-stock').value) || 0;
                await _supa.from('productos').insert([obj]); 
            }
            modalProd.hide(); 
            init();
        }

        async function eliminarProducto() {
            const id = document.getElementById('edit-id').value;
            if(confirm("¿Eliminar producto?")) {
                await _supa.from('productos').delete().eq('id', id);
                modalProd.hide(); 
                init();
            }
        }

       async function registrarVenta(id) {
    const { value: cant } = await Swal.fire({
        title: 'Registrar Venta',
        input: 'number',
        inputLabel: '¿Cuántas unidades se vendieron?',
        inputValue: 1,
        showCancelButton: true,
        confirmButtonText: 'Vender',
        inputValidator: (value) => {
            if (!value || value <= 0) return '¡Ingresa una cantidad válida!';
        }
    });

    if (cant) {
        try {
            // Enviamos los datos mapeados exactamente al esquema de la imagen image_6a4c1d.png
            const { error } = await _supa.from('movimientos_inventario').insert([{
                producto_id: id,                  // UUID del producto
                cantidad: parseInt(cant),         // Aseguramos que sea número (int4)
                tipo_movimiento: 'Venta',         // Coincide con la lógica del Trigger
                tienda_id: MI_TIENDA_ID,          // UUID de la tienda activa
                fecha: new Date().toISOString()   // Estampa de tiempo (timestamptz)
            }]);

            if (error) throw error;
            
            // Mensaje de éxito y refresco de interfaz
            notify('¡Vendido!', 'Venta registrada y stock actualizado.', 'success');
            if (typeof init === 'function') init(); 
            
        } catch (err) {
            console.error("Error en Supabase:", err);
            notify('Error en Venta', `No se pudo registrar: ${err.message}`, 'error');
        }
    }
}
        

/**
 * Única función para ingresar nuevas existencias a un producto.
 * Sincronizada con el esquema de movimientos_inventario.
 */
async function añadirStock(id, nombre) {
    // 1. Solicitud de cantidad mediante SweetAlert2
    const { value: cantidad } = await Swal.fire({
        title: `Añadir Stock: ${nombre}`,
        input: 'number',
        inputLabel: '¿Cuántas unidades nuevas ingresan?',
        inputPlaceholder: 'Ej: 10',
        showCancelButton: true,
        confirmButtonText: 'Añadir',
        cancelButtonText: 'Cancelar',
        confirmButtonColor: '#1d63ff',
        inputValidator: (value) => {
            if (!value || value <= 0) {
                return '¡Debes ingresar una cantidad mayor a cero!';
            }
        }
    });

    // 2. Si el usuario confirmó una cantidad, procedemos a la base de datos
    if (cantidad) {
        try {
            // Solo una inserción para evitar duplicados
            const { error } = await _supa.from('movimientos_inventario').insert([{
                producto_id: id,                  // UUID del producto
                cantidad: parseInt(cantidad),     // Convertimos a entero para el campo int4
                tipo_movimiento: 'Entrada',       // El Trigger sumará esto al stock_actual
                tienda_id: MI_TIENDA_ID,          // UUID de tu tienda
                motivo: 'Ingreso manual de stock',
                fecha: new Date().toISOString()   // Estampa de tiempo para el historial
            }]);

            if (error) throw error;

            // 3. Notificación de éxito y recarga de la interfaz
            await Swal.fire('¡Actualizado!', `Se han añadido ${cantidad} unidades.`, 'success');
            
            // Llama a tu función principal para refrescar la tabla
            if (typeof init === 'function') init(); 

        } catch (err) {
            console.error("Error al añadir stock:", err.message);
            Swal.fire('Error', 'No se pudo actualizar el stock: ' + err.message, 'error');
        }
    }
}

// Reemplazo de eliminarProducto con confirmación elegante
async function eliminarProducto() {
    const id = document.getElementById('edit-id').value;
    
    const resultado = await Swal.fire({
        title: '¿Estás seguro?',
        text: "Esta acción no se puede deshacer",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar'
    });

    if (resultado.isConfirmed) {
        await _supa.from('productos').delete().eq('id', id);
        modalProd.hide();
        notify('Eliminado', 'El producto ha sido borrado.', 'success');
        init();
    }
}

        function filtrar(t) {
            const res = dbLocal.filter(p => 
                p.nombre.toLowerCase().includes(t.toLowerCase()) || 
                (p.sku && p.sku.toLowerCase().includes(t.toLowerCase()))
            );
            renderizar(res);
        }

        function exportarExcel() {
            const datosExcel = dbLocal.map(p => ({
                SKU: p.sku || 'N/A',
                Producto: p.nombre,
                Categoría: p.categorias?.nombre || 'Sin Cat.',
                Costo: p.precio_costo,
                Venta: p.precio_venta,
                Stock: p.stock_actual,
                Inversión: (p.precio_costo * p.stock_actual).toFixed(2)
            }));
            const hoja = XLSX.utils.json_to_sheet(datosExcel);
            const libro = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(libro, hoja, "Inventario");
            XLSX.writeFile(libro, `Inventario_${TIENDA_NOMBRE}.xlsx`);
        }

        window.onload = verificarSesion;

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }
    </script>
</body>
</html>
